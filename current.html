<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Center</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Slate 900 */
      color: #e2e8f0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Utilitarios */
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-icon {
      @apply p-2 rounded-lg transition-all duration-200 flex items-center justify-center;
    }

    .terminal-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    /* Animaciones */
    @keyframes pulse-live {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .live-indicator {
      width: 10px;
      height: 10px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: pulse-live 2s infinite;
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>

<body class="h-screen flex overflow-hidden">
  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-20 hidden md:flex">
    <div class="p-6 flex items-center gap-3">
      <div class="w-8 h-8 bg-cyan-600 rounded-lg flex items-center justify-center">
        <i class="fa-solid fa-network-wired text-white text-sm"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight text-white">Control<span class="text-cyan-500">Center</span></h1>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a href="#" onclick="switchView('dashboard')" id="nav-dashboard"
        class="flex items-center gap-3 px-4 py-3 rounded-lg bg-slate-800 text-cyan-400 font-medium transition-colors">
        <i class="fa-solid fa-grid-2"></i> Dashboard
      </a>
      <div class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6">Acciones Rápidas</div>
      <button onclick="broadcastCommand('/lock')"
        class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-400 hover:text-red-400 hover:bg-slate-800 transition-colors text-left">
        <i class="fa-solid fa-lock"></i> Bloquear Todos
      </button>
      <button onclick="broadcastCommand('/unlock')"
        class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-400 hover:text-green-400 hover:bg-slate-800 transition-colors text-left">
        <i class="fa-solid fa-lock-open"></i> Desbloquear Todos
      </button>
      <button onclick="broadcastCommand('shutdown /s /t 0')"
        class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-slate-400 hover:text-red-400 hover:bg-slate-800 transition-colors text-left">
        <i class="fa-solid fa-power-off"></i> Apagar Todos
      </button>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-green-500" id="server-status-dot"></div>
        <span class="text-xs text-slate-400" id="server-status-text">Conectado</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col relative overflow-hidden bg-slate-950">

    <!-- HEADER MOVIL -->
    <header class="md:hidden h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 z-20">
      <h1 class="text-lg font-bold">ControlCenter</h1>
      <button id="mobile-menu-btn" class="text-slate-400"><i class="fa-solid fa-bars text-xl"></i></button>
    </header>

    <!-- VIEWS CONTAINER -->
    <div class="flex-1 overflow-hidden relative">

      <!-- VISTA: DASHBOARD (GRID) -->
      <div id="view-dashboard" class="absolute inset-0 overflow-y-auto p-6 transition-transform duration-300">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
          <h2 class="text-2xl font-semibold text-white">Dispositivos Conectados</h2>

          <div class="flex items-center gap-4">
            <!-- Selector de velocidad -->
            <select id="setting-global-delay"
              class="bg-slate-800 text-xs border border-slate-700 rounded px-2 py-2 text-slate-300 outline-none">
              <option value="200">200ms</option>
              <option value="500" selected>500ms</option>
              <option value="1000">1s</option>
              <option value="2000">2s</option>
            </select>
            <!-- Botón de Directo Global -->
            <button id="btn-global-live" onclick="toggleGlobalLiveMode()"
              class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all flex items-center gap-2 border border-slate-700 text-sm font-medium">
              <i class="fa-solid fa-video"></i> Directo Global
            </button>
            <div class="text-sm text-slate-400 bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">Total: <span
                id="machine-count" class="text-cyan-400 font-bold">0</span>
            </div>
          </div>
        </div>

        <div id="machines-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          <!-- Cards insertadas por JS -->
          <p class="text-slate-500 col-span-full text-center py-20">Esperando conexión de agentes...</p>
        </div>
      </div>

      <!-- VISTA: DETALLE (LIVE MONITOR) -->
      <div id="view-detail"
        class="absolute inset-0 bg-slate-950 flex flex-col translate-x-full transition-transform duration-300 z-30 hidden">

        <!-- Toolbar Superior -->
        <div class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shadow-sm z-10">
          <div class="flex items-center gap-4">
            <button onclick="switchView('dashboard')" class="text-slate-400 hover:text-white transition-colors">
              <i class="fa-solid fa-arrow-left text-lg"></i>
            </button>
            <div>
              <h2 class="text-lg font-bold text-white flex items-center gap-2">
                <span id="detail-name">...</span>
                <span id="detail-status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
              </h2>
              <div class="text-xs text-slate-400 flex gap-3">
                <span id="detail-ip"><i class="fa-solid fa-network-wired mr-1"></i>...</span>
                <span id="detail-user"><i class="fa-solid fa-user mr-1"></i>...</span>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <select id="setting-detail-delay"
              class="bg-slate-800 text-xs border border-slate-700 rounded px-2 py-2 text-slate-300 outline-none">
              <option value="200">200ms</option>
              <option value="500" selected>500ms</option>
              <option value="1000">1s</option>
              <option value="2000">2s</option>
            </select>
            <button id="btn-live-toggle" onclick="toggleLiveMode()"
              class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all flex items-center gap-2 border border-slate-700">
              <i class="fa-solid fa-video"></i> Ver en Directo
            </button>
            <div class="h-6 w-px bg-slate-700 mx-1"></div>
            <button onclick="sendDetailCommand('/lock')" class="btn-icon bg-slate-800 text-red-500 hover:bg-red-900/20"
              title="Bloquear">
              <i class="fa-solid fa-lock"></i>
            </button>
            <button onclick="sendDetailCommand('shutdown /s /t 0')"
              class="btn-icon bg-slate-800 text-red-500 hover:bg-red-900/20" title="Apagar">
              <i class="fa-solid fa-power-off"></i>
            </button>
            <button onclick="captureScreenshot()" class="btn-icon bg-slate-800 text-cyan-500 hover:bg-cyan-900/20"
              title="Screenshot Instantánea">
              <i class="fa-solid fa-camera"></i>
            </button>
          </div>
        </div>

        <!-- Área Principal Dividida -->
        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
          <!-- Izquierda: Monitor / Screenshot -->
          <div class="flex-1 bg-black relative flex items-center justify-center overflow-hidden p-4">
            <div id="live-badge" class="absolute top-6 left-6 z-20 hidden">
              <span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full flex items-center shadow-lg">
                <span class="live-indicator bg-white"></span> LIVE
              </span>
            </div>

            <img id="detail-image" src="" alt="Esperando imagen..."
              class="max-w-full max-h-full object-contain shadow-2xl rounded-lg border border-slate-800"
              style="display:none;">

            <div id="detail-placeholder" class="text-center text-slate-600">
              <i class="fa-solid fa-display text-6xl mb-4 opacity-20"></i>
              <p>Sin señal de video</p>
              <p class="text-sm mt-2">Pulsa "Ver en Directo" o captura una imagen.</p>
            </div>
          </div>

          <!-- Derecha: Pestañas Terminal / Archivos -->
          <div
            class="w-full lg:w-[450px] h-64 lg:h-full flex flex-col bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 z-10">

            <!-- Pestañas -->
            <div class="flex border-b border-slate-800 bg-slate-950">
              <button onclick="switchRightTab('terminal')" id="tab-btn-terminal"
                class="flex-1 py-3 text-sm font-bold border-b-2 border-cyan-500 text-cyan-500 transition-colors">
                <i class="fa-solid fa-terminal mr-2"></i> Terminal
              </button>
              <button onclick="switchRightTab('files')" id="tab-btn-files"
                class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors">
                <i class="fa-solid fa-folder-open mr-2"></i> Archivos
              </button>
            </div>

            <!-- Tab: Terminal -->
            <div id="tab-content-terminal" class="flex-1 flex flex-col min-h-0 bg-slate-900">
              <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-xs text-slate-400">Consola de Comandos</h3>
                <button onclick="document.getElementById('terminal-output').innerHTML=''"
                  class="text-slate-400 hover:text-white text-xs"><i class="fa-solid fa-trash"></i></button>
              </div>
              <div
                class="flex-1 p-3 overflow-y-auto font-mono text-xs text-green-400 bg-black whitespace-pre-wrap selection:bg-green-900 break-all"
                id="terminal-output"></div>
              <div class="p-3 border-t border-slate-800 flex gap-2 w-full">
                <span class="text-slate-500 font-mono mt-2" id="cwd-prompt">C:\></span>
                <input type="text" id="terminal-input"
                  class="flex-1 w-full bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-white font-mono focus:outline-none focus:border-cyan-500"
                  placeholder="comando...">
                <button onclick="sendTerminalCommand()"
                  class="bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-2 rounded transition-colors"><i
                    class="fa-solid fa-play"></i></button>
              </div>
            </div>

            <!-- Tab: Archivos -->
            <div id="tab-content-files" class="flex-1 flex flex-col min-h-0 bg-slate-900 hidden">
              <div class="p-2 border-b border-slate-800 flex gap-2 items-center bg-slate-800/50 flex-wrap">
                <button onclick="requestDirUp()" class="p-2 text-slate-400 hover:text-white" title="Subir nivel"><i
                    class="fa-solid fa-level-up-alt"></i></button>
                <button onclick="requestDir()" class="p-2 text-slate-400 hover:text-white" title="Actualizar"><i
                    class="fa-solid fa-sync"></i></button>
                <span class="text-xs text-slate-300 font-mono truncate flex-1 leading-snug"
                  id="fm-current-path">C:\</span>
                <label class="p-2 text-cyan-400 hover:text-cyan-300 cursor-pointer" title="Subir Archivo">
                  <i class="fa-solid fa-upload"></i>
                  <input type="file" id="fm-upload-input" class="hidden" onchange="handleFileUpload(event)">
                </label>
              </div>
              <div class="flex-1 overflow-y-auto bg-black p-2">
                <table class="w-full text-left text-sm text-slate-300">
                  <thead class="text-xs uppercase bg-slate-800 text-slate-400 sticky top-0">
                    <tr>
                      <th class="px-2 py-2 font-normal">Nombre</th>
                      <th class="px-2 py-2 font-normal w-20">Tamaño</th>
                      <th class="px-2 py-2 font-normal w-12 text-center"><i class="fa-solid fa-bolt"></i></th>
                    </tr>
                  </thead>
                  <tbody id="fm-list" class="divide-y divide-slate-800">
                    <tr>
                      <td colspan="3" class="text-center py-4 text-slate-500">Cargando directorio...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Template Card -->
  <template id="card-template">
    <div class="rounded-xl glass p-5 flex flex-col gap-4 hover:border-cyan-500/50 transition-all cursor-pointer group"
      onclick="selectMachine('NAME')">
      <div class="flex justify-between items-start">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 text-xl icon-device">
            <i class="fa-solid fa-desktop text-cyan-600"></i>
          </div>
          <div>
            <h3 class="font-bold text-white leading-tight name-text">...</h3>
            <span class="text-xs text-slate-400 status-text">Offline</span>
          </div>
        </div>
        <div class="w-2 h-2 rounded-full bg-slate-600 status-dot"></div>
      </div>

      <div class="h-28 bg-black rounded-lg border border-slate-700 overflow-hidden relative preview-container">
        <img class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity preview-img" src=""
          style="display:none;">
        <div class="absolute inset-0 flex items-center justify-center text-slate-600 no-preview-icon">
          <i class="fa-regular fa-image text-2xl"></i>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2 text-xs text-slate-400 mt-1">
        <div class="bg-slate-800/50 rounded px-2 py-1 truncate"><i class="fa-solid fa-user mr-1 w-3 text-center"></i>
          <span class="user-text">...</span>
        </div>
        <div class="bg-slate-800/50 rounded px-2 py-1 truncate"><i class="fa-solid fa-laptop mr-1 w-3 text-center"></i>
          <span class="os-text">...</span>
        </div>
      </div>
    </div>
  </template>

  <!-- Firebase Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://hello-74404-default-rtdb.europe-west1.firebasedatabase.app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Estado Local
    let machines = {};
    let selectedMachine = null;
    let liveModeInterval = null;
    let isLive = false;
    let currentCWD = "C:\\";
    let timeOffset = 0;

    // Estado Live Global
    let globalLiveInterval = null;
    let isGlobalLive = false;

    let nitroInterval = null;

    // Elementos DOM
    const gridEl = document.getElementById('machines-grid');
    const machineCountEl = document.getElementById('machine-count');
    const viewDashboard = document.getElementById('view-dashboard');
    const viewDetail = document.getElementById('view-detail');
    const navDashboard = document.getElementById('nav-dashboard');

    // Elementos Detalle
    const detailName = document.getElementById('detail-name');
    const detailIp = document.getElementById('detail-ip');
    const detailUser = document.getElementById('detail-user');
    const detailImage = document.getElementById('detail-image');
    const detailPlaceholder = document.getElementById('detail-placeholder');
    const btnLiveToggle = document.getElementById('btn-live-toggle');
    const liveBadge = document.getElementById('live-badge');

    // Elementos Terminal
    const terminalOutputEl = document.getElementById('terminal-output');
    const terminalInputEl = document.getElementById('terminal-input');
    const cwdPromptEl = document.getElementById('cwd-prompt');

    // Init Logic
    window.addEventListener('load', async () => {
      await initTimeOffset();
      initListeners();
    });

    // --- Time Sync ---
    async function initTimeOffset() {
      try {
        const response = await fetch("https://worldtimeapi.org/api/ip");
        if (response.ok) {
          const data = await response.json();
          // worldtimeapi devuelve 'unixtime' que está en segundos
          const serverTime = data.unixtime;
          timeOffset = serverTime - Math.floor(Date.now() / 1000);
          console.log("Time Offset:", timeOffset);
        }
      } catch (e) {
        console.warn("Time sync error", e);
        timeOffset = 0; // Fallback a 0
      }
    }

    function getAdjustedTime() { return Math.floor(Date.now() / 1000) + timeOffset; }

    // --- Firebase Listeners ---
    function initListeners() {
      // Escuchar todas las máquinas
      onValue(ref(db, 'machines'), (snapshot) => {
        machines = snapshot.val() || {};
        renderGrid();
        updateDetailIfOpen();
      });
    }

    // --- Rendering ---
    function renderGrid() {
      gridEl.innerHTML = '';
      const names = Object.keys(machines).sort();
      machineCountEl.textContent = names.length;

      if (names.length === 0) {
        gridEl.innerHTML = '<p class="text-slate-500 col-span-full text-center py-20">No hay dispositivos...</p>';
        return;
      }

      const tpl = document.getElementById('card-template').content;

      names.forEach(name => {
        const m = machines[name];
        const lastSeen = m.status?.lastSeen;
        const info = m.info || {};
        const isOnline = lastSeen && (getAdjustedTime() - lastSeen < 40);

        // Decodificar Base64 seguro
        const user = safeB64(info.user);
        const os = safeB64(info.os);

        const el = tpl.cloneNode(true);
        const card = el.querySelector('div'); // Root div
        card.setAttribute('onclick', `selectMachine('${name}')`); // Hack por scope

        el.querySelector('.name-text').textContent = name;
        el.querySelector('.user-text').textContent = user || '?';
        el.querySelector('.os-text').textContent = os || '?';
        el.querySelector('.status-text').textContent = isOnline ? 'En línea' : `Visto: ${new Date((lastSeen + timeOffset) * 1000).toLocaleTimeString()}`;
        el.querySelector('.status-dot').className = `w-2 h-2 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'bg-slate-600'}`;

        // Preview de imagen si existe
        if (m.screenshot && m.screenshot.data) {
          const img = el.querySelector('.preview-img');
          const dataStr = m.screenshot.data;
          if (dataStr.startsWith("gb:")) {
            img.src = "https://greenbase.arielcapdevila.com/file/" + dataStr.substring(3) + "?_t=" + Date.now();
          } else {
            img.src = "data:image/jpeg;base64," + dataStr;
          }
          img.style.display = 'block';
          el.querySelector('.no-preview-icon').style.display = 'none';
        }

        gridEl.appendChild(el);
      });
    }

    // --- View Logic ---
    window.selectMachine = function (name) {
      selectedMachine = name;
      switchView('detail');

      // Reset Detail UI
      detailName.textContent = name;
      detailIp.innerHTML = `<i class="fa-solid fa-network-wired mr-1"></i> ${safeB64(machines[name]?.info?.ip) || '...'}`;
      detailUser.innerHTML = `<i class="fa-solid fa-user mr-1"></i> ${safeB64(machines[name]?.info?.user) || '...'}`;

      const cwdEncoded = machines[name]?.info?.cwd;
      currentCWD = cwdEncoded ? safeB64(cwdEncoded) : "C:\\";
      cwdPromptEl.textContent = currentCWD.split('\\').pop() + ">";

      // Stop anterior live mode individual
      stopLiveMode();

      // Update image immediately if exists
      const ssData = machines[name]?.screenshot?.data;
      if (ssData) {
        updateDetailImage(ssData);
      } else {
        detailImage.style.display = 'none';
        detailPlaceholder.style.display = 'block';
      }

      startNitro(name);
    };

    window.switchView = function (view) {
      if (view === 'dashboard') {
        stopLiveMode();
        stopNitro();
        selectedMachine = null;
        viewDetail.classList.add('translate-x-full'); // Hide sidebar
        setTimeout(() => viewDetail.classList.add('hidden'), 300); // Wait for transition
        navDashboard.classList.add('bg-slate-800', 'text-cyan-400');
      } else {
        viewDetail.classList.remove('hidden');
        requestAnimationFrame(() => viewDetail.classList.remove('translate-x-full'));
        navDashboard.classList.remove('bg-slate-800', 'text-cyan-400');
        navDashboard.classList.add('text-slate-400');
      }
    };

    function updateDetailIfOpen() {
      if (!selectedMachine || viewDetail.classList.contains('hidden')) return;

      const m = machines[selectedMachine];
      if (!m) return;

      // Update Screen
      if (m.screenshot?.data && (m.screenshot.id !== detailImage.dataset.lastId)) {
        updateDetailImage(m.screenshot.data);
        detailImage.dataset.lastId = m.screenshot.id;
      }

      // Update Status UI
      const lastSeen = m.status?.lastSeen;
      const isOnline = lastSeen && (getAdjustedTime() - lastSeen < 40);
      document.getElementById('detail-status-dot').className = `w-2 h-2 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`;

      // Update Terminal
      if (m.lastResponse && (m.lastResponse.id !== terminalOutputEl.dataset.lastId)) {
        appendTerminalResponse(m.lastResponse.response);
        terminalOutputEl.dataset.lastId = m.lastResponse.id;
      }
    }

    function updateDetailImage(dataStr) {
      if (dataStr.startsWith("gb:")) {
        detailImage.src = "https://greenbase.arielcapdevila.com/file/" + dataStr.substring(3) + "?_t=" + Date.now();
      } else {
        detailImage.src = "data:image/jpeg;base64," + dataStr;
      }
      detailImage.style.display = 'block';
      detailPlaceholder.style.display = 'none';
    }

    // --- Live Mode Individual Logic ---
    window.toggleLiveMode = function () {
      if (isLive) {
        stopLiveMode();
      } else {
        startLiveMode();
      }
    }

    function startLiveMode() {
      if (!selectedMachine) return;
      isLive = true;
      btnLiveToggle.innerHTML = '<span class="live-indicator"></span> Detener Directo';
      btnLiveToggle.classList.add('border-red-500/50', 'text-red-400', 'bg-red-900/10');
      btnLiveToggle.classList.remove('bg-slate-800', 'text-slate-300');
      liveBadge.classList.remove('hidden');

      // Enviar comando inicial
      sendLiveCommand();

      // Configurar loop de renovación (cada 15s para renovar el de 20s)
      liveModeInterval = setInterval(() => {
        if (!selectedMachine || !isLive) return;
        sendLiveCommand();
      }, 15000);
    }

    function stopLiveMode() {
      isLive = false;
      btnLiveToggle.innerHTML = '<i class="fa-solid fa-video"></i> Ver en Directo';
      btnLiveToggle.classList.remove('border-red-500/50', 'text-red-400', 'bg-red-900/10');
      btnLiveToggle.classList.add('bg-slate-800', 'text-slate-300');
      liveBadge.classList.add('hidden');
      if (liveModeInterval) clearInterval(liveModeInterval);
      liveModeInterval = null;
      if (selectedMachine) {
        sendFirebaseCommand(selectedMachine, "/stoplivestream", currentCWD, false);
      }
    }

    async function sendLiveCommand() {
      const delay = document.getElementById('setting-detail-delay').value || "500";
      console.log("Iniciando modo LiveStream Individual...", "info");
      await sendFirebaseCommand(selectedMachine, `/livestream ${delay}`, currentCWD, false); // No borrar inmediatamente
    }

    // --- Live Mode GLOBAL Logic ---
    window.toggleGlobalLiveMode = function () {
      if (isGlobalLive) {
        stopGlobalLiveMode();
      } else {
        startGlobalLiveMode();
      }
    }

    function startGlobalLiveMode() {
      isGlobalLive = true;
      const btnGlobalLive = document.getElementById('btn-global-live');

      if (btnGlobalLive) {
        btnGlobalLive.innerHTML = '<span class="live-indicator"></span> Detener Global';
        btnGlobalLive.classList.add('border-red-500/50', 'text-red-400', 'bg-red-900/10');
        btnGlobalLive.classList.remove('bg-slate-800', 'text-slate-300');
      }

      sendGlobalLiveCommand();

      // Loop de renovación a TODOS (cada 15s)
      globalLiveInterval = setInterval(() => {
        if (!isGlobalLive) return;
        sendGlobalLiveCommand();
      }, 15000);
    }

    function stopGlobalLiveMode() {
      isGlobalLive = false;
      const btnGlobalLive = document.getElementById('btn-global-live');

      if (btnGlobalLive) {
        btnGlobalLive.innerHTML = '<i class="fa-solid fa-video"></i> Directo Global';
        btnGlobalLive.classList.remove('border-red-500/50', 'text-red-400', 'bg-red-900/10');
        btnGlobalLive.classList.add('bg-slate-800', 'text-slate-300');
      }

      if (globalLiveInterval) clearInterval(globalLiveInterval);
      globalLiveInterval = null;
      Object.keys(machines).forEach(name => {
        sendFirebaseCommand(name, "/stoplivestream", "C:\\", false);
      });
    }

    async function sendGlobalLiveCommand() {
      const names = Object.keys(machines);
      if (names.length === 0) return;

      const delay = document.getElementById('setting-global-delay').value || "500";

      console.log(`Enviando LiveStream a ${names.length} dispositivos...`);
      names.forEach(name => {
        sendFirebaseCommand(name, `/livestream ${delay}`, "C:\\", false);
      });
    }

    // --- Utilities ---
    window.captureScreenshot = async function () {
      if (!selectedMachine) return;
      console.log("Solicitando captura...", "info");
      await sendFirebaseCommand(selectedMachine, "/screenshot", currentCWD);
    }

    async function sendFirebaseCommand(name, cmd, cwd, autoRemove = true) {
      const id = "cmd-" + Date.now();
      const payload = { id, cmd, cwd };
      const cmdRef = ref(db, `machines/${encodeKey(name)}/command`);
      await set(cmdRef, payload);

      if (autoRemove) {
        setTimeout(() => remove(cmdRef), 6000);
      }
    }

    // --- Funciones MODO NITRO (1s) ---
    function startNitro(name) {
      if (nitroInterval) clearInterval(nitroInterval);
      sendFirebaseCommand(name, "/nitro", currentCWD, false);
      nitroInterval = setInterval(() => {
        if (selectedMachine === name) {
          sendFirebaseCommand(name, "/nitro", currentCWD, false);
        } else {
          stopNitro();
        }
      }, 20000); // renovar cada 20s
    }

    function stopNitro() {
      if (nitroInterval) clearInterval(nitroInterval);
      nitroInterval = null;
    }

    window.broadcastCommand = function (cmd) {
      if (!confirm("¿Enviar '" + cmd + "' a TODAS las máquinas?")) return;
      Object.keys(machines).forEach(name => {
        sendFirebaseCommand(name, cmd, "C:\\", true);
      });
    }

    window.sendDetailCommand = function (cmd) {
      if (!selectedMachine) return;
      if (!confirm("¿Enviar '" + cmd + "' a " + selectedMachine + "?")) return;
      sendFirebaseCommand(selectedMachine, cmd, currentCWD);
    }

    // --- Terminal Logic ---
    window.sendTerminalCommand = async function () {
      if (!selectedMachine) return;
      const cmd = terminalInputEl.value.trim();
      if (!cmd) return;

      terminalInputEl.value = '';
      terminalInputEl.disabled = true;

      terminalOutputEl.innerHTML += `\n<span class="text-cyan-400">${currentCWD}> ${cmd}</span>\n`;
      terminalOutputEl.scrollTop = terminalOutputEl.scrollHeight;

      await sendFirebaseCommand(selectedMachine, cmd, currentCWD, false);
      terminalInputEl.disabled = false;
      terminalInputEl.focus();
    }

    terminalInputEl.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        sendTerminalCommand();
      }
    });

    function appendTerminalResponse(encodedResp) {
      if (!encodedResp) return;

      const decoded = safeB64(encodedResp);

      // Chequear si es una respuesta especial (DIR, FILE, etc)
      if (decoded.startsWith("DIR:")) {
        handleDirResponse(decoded.substring(4));
        return;
      }
      if (decoded.startsWith("FILE:")) {
        handleFileResponse(decoded.substring(5));
        return;
      }

      terminalOutputEl.innerHTML += `<span class="text-slate-300">${escapeHTML(decoded)}</span>\n`;
      terminalOutputEl.scrollTop = terminalOutputEl.scrollHeight;
    }

    // --- Tab Switch Logic ---
    window.switchRightTab = function (tab) {
      const btnTerm = document.getElementById('tab-btn-terminal');
      const btnFiles = document.getElementById('tab-btn-files');
      const contentTerm = document.getElementById('tab-content-terminal');
      const contentFiles = document.getElementById('tab-content-files');

      if (tab === 'terminal') {
        btnTerm.className = "flex-1 py-3 text-sm font-bold border-b-2 border-cyan-500 text-cyan-500 transition-colors";
        btnFiles.className = "flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors";
        contentTerm.classList.remove('hidden');
        contentFiles.classList.add('hidden');
      } else {
        btnFiles.className = "flex-1 py-3 text-sm font-bold border-b-2 border-cyan-500 text-cyan-500 transition-colors";
        btnTerm.className = "flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-colors";
        contentTerm.classList.add('hidden');
        contentFiles.classList.remove('hidden');

        // Solicitar listado de CWD
        requestDir(currentCWD);
      }
    };

    // --- File Manager Logic ---
    window.requestDirUp = function () {
      const parts = currentCWD.split('\\');
      if (parts.length > 1) {
        parts.pop();
        let p = parts.join('\\');
        if (p.length === 2 && p.endsWith(':')) p += '\\';
        requestDir(p);
      } else {
        requestDir(currentCWD);
      }
    };

    window.requestDirB64 = function (b64) {
      requestDir(decodeURIComponent(escape(atob(b64))));
    };
    window.fmDownloadB64 = function (b64) {
      fmDownload(decodeURIComponent(escape(atob(b64))));
    };
    window.fmDeleteB64 = function (b64) {
      fmDelete(decodeURIComponent(escape(atob(b64))));
    };

    window.requestDir = function (path) {
      if (!path) path = currentCWD;
      document.getElementById('fm-list').innerHTML = `<tr><td colspan="3" class="text-center py-4 text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Cargando...</td></tr>`;
      sendFirebaseCommand(selectedMachine, `/listdir ${path}`, currentCWD, false);
    };

    function handleDirResponse(jsonStr) {
      try {
        const data = JSON.parse(jsonStr);
        const listEl = document.getElementById('fm-list');
        listEl.innerHTML = '';

        currentCWD = safeB64(data.path);
        document.getElementById('fm-current-path').textContent = currentCWD;
        document.getElementById('cwd-prompt').textContent = currentCWD.split('\\').pop() + ">"; // synchronizar terminal root

        data.folders.forEach(f => {
          const name = safeB64(f.name);
          const rawPath = currentCWD + (currentCWD.endsWith('\\') ? '' : '\\') + name;
          const safeB64Path = btoa(unescape(encodeURIComponent(rawPath)));

          const tr = document.createElement('tr');
          tr.className = "hover:bg-slate-800/50 group";
          tr.innerHTML = `
            <td class="px-2 py-2 cursor-pointer text-cyan-400 truncate max-w-[150px]" onclick="requestDirB64('${safeB64Path}')"><i class="fa-solid fa-folder text-blue-400 mr-2"></i>${escapeHTML(name)}</td>
            <td class="px-2 py-2">-</td>
            <td class="px-2 py-2 text-center opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
              <button onclick="fmDeleteB64('${safeB64Path}')" class="text-red-400 hover:text-red-300 mx-1" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
            </td>
          `;
          listEl.appendChild(tr);
        });

        data.files.forEach(f => {
          const name = safeB64(f.name);
          const rawPath = currentCWD + (currentCWD.endsWith('\\') ? '' : '\\') + name;
          const safeB64Path = btoa(unescape(encodeURIComponent(rawPath)));

          const tr = document.createElement('tr');
          tr.className = "hover:bg-slate-800/50 group";
          tr.innerHTML = `
            <td class="px-2 py-2 truncate max-w-[150px]"><i class="fa-regular fa-file text-slate-400 mr-2"></i>${escapeHTML(name)}</td>
            <td class="px-2 py-2 text-xs">${formatBytes(f.size)}</td>
            <td class="px-2 py-2 text-center opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
              <button onclick="fmDownloadB64('${safeB64Path}')" class="text-green-400 hover:text-green-300 mx-1" title="Descargar"><i class="fa-solid fa-download"></i></button>
              <button onclick="fmDeleteB64('${safeB64Path}')" class="text-red-400 hover:text-red-300 mx-1" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
            </td>
          `;
          listEl.appendChild(tr);
        });

        if (data.folders.length === 0 && data.files.length === 0) {
          listEl.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-slate-500">Carpeta vacía</td></tr>`;
        }
      } catch (e) {
        document.getElementById('fm-list').innerHTML = `<tr><td colspan="3" class="text-center py-4 text-red-400">Error parseando respuesta</td></tr>`;
        console.error(e, jsonStr);
      }
    }

    function handleFileResponse(dataStr) {
      // formato: ruta_b64:b64_contenido
      const parts = dataStr.split(":");
      if (parts.length < 2) return;
      const pathB64 = parts[0];
      const contentB64 = parts.slice(1).join(":"); // en caso de haber : dentro

      const filename = safeB64(pathB64).split('\\').pop();
      downloadBase64File(contentB64, filename);
    }

    window.fmDownload = function (path) {
      sendFirebaseCommand(selectedMachine, `/readfile ${path}`, currentCWD, false);
    };

    window.fmDelete = function (path) {
      if (!confirm('¿Eliminar ' + path + '?')) return;
      sendFirebaseCommand(selectedMachine, `/deletefile ${path}`, currentCWD, false);
      setTimeout(() => requestDir(currentCWD), 1000);
    };

    window.handleFileUpload = async function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        const base64Content = e.target.result.split(',')[1];
        if (!base64Content) return;

        // Bloques grandes pueden dar problema en Firebase (límite JSON?), max 1MB idealmente
        if (base64Content.length > 2000000) {
          alert("El archivo es muy grande para subir por esta vía (>1.5MB aprox)");
          return;
        }

        await sendFirebaseCommand(selectedMachine, `/uploadb64 "${file.name}" ${base64Content}`, currentCWD, false);
        setTimeout(() => requestDir(currentCWD), 1500);
      };
      reader.readAsDataURL(file);
      event.target.value = ''; // reset
    };

    function formatBytes(bytes, decimals = 2) {
      if (!+bytes) return '0 B';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    // Download helpers
    function downloadBase64File(base64Data, filename) {
      const linkSource = `data:application/octet-stream;base64,${base64Data}`;
      const downloadLink = document.createElement("a");
      downloadLink.href = linkSource;
      downloadLink.download = filename;
      downloadLink.click();
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag] || tag));
    }

    function safeB64(str) {
      if (!str) return "";
      try { return decodeURIComponent(escape(window.atob(str.replace(/\s+/g, '')))); } catch (e) { return str; }
    }

    function encodeKey(s) { return s.replace(/[.\$\[\]#\/ ]/g, "_"); }

  </script>
</body>
